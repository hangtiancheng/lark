<!-- Counter View Template -->
<div class="{{=styles['counter-page']}}">
  <div class="{{=styles['counter-page__container']}}">
    <h1 class="{{=styles['counter-page__title']}}">Counter Example</h1>
    <p class="{{=styles['counter-page__description']}}">
      Data updates &amp; event handling
    </p>

    <div class="{{=styles['counter-page__grid']}}">
      <!-- Sub-View: Counter Store Component -->
      <div
        class="{{=styles['counter-page__store-slot']}}"
        #view="components/counter-store"
      ></div>

      <!-- Sub-View: Counter Updater Component -->
      <div
        #view="components/counter-updater"
        *count="{{=count}}"
        *step="{{=step}}"
        *history="{{@history}}"
        @increment="increment"
        @decrement="decrement"
      ></div>
    </div>

    <button
      @click="navigateTo({path: '/home'})"
      class="{{=styles['counter-page__button']}}"
    >
      Back to Home
    </button>
  </div>
</div>
