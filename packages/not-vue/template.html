<div class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
  <section
    class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm shadow-slate-200/60"
  >
    <h2 class="mb-3 text-lg" @click="onTitleClick">
      {{ title }}
    </h2>
    <p class="leading-7 text-slate-500">
      Click the title to toggle visibility and switch the image. Click the image
      to update the title.
    </p>
    <div v-if="isActive">
      <img
        class="mt-3 block w-full max-w-60 cursor-pointer rounded-xl object-cover"
        :src="avatarUrl"
        :alt="title"
        @click="onImgClick"
      />
    </div>
    <p class="mt-2 text-sm text-slate-500">
      Preview status: {{ isActive ? 'visible' : 'hidden' }} · Selected image:
      {{ avatarName }}
    </p>
    <div class="mt-3 flex flex-wrap gap-2">
      <button
        class="rounded-lg bg-slate-600 px-3 py-2 text-sm text-white transition hover:bg-slate-700"
        @click="onTitleClick"
      >
        {{ isActive ? 'Hide Preview' : 'Show Preview' }}
      </button>
    </div>
  </section>

  <section
    class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm shadow-slate-200/60"
  >
    <h2 class="mb-3 text-lg">Products</h2>
    <div
      class="flex items-center justify-between border-b border-dashed border-slate-200 py-2"
    >
      <span>Product 1 [CNY 10]</span>
      <button
        id="btn1"
        class="rounded-lg bg-blue-600 px-3 py-2 text-sm text-white transition hover:bg-blue-700"
        @click="addFirst"
      >
        Add Product 1
      </button>
    </div>
    <div class="flex items-center justify-between py-2">
      <span>Product 2 [CNY 20]</span>
      <button
        id="btn2"
        class="rounded-lg bg-blue-600 px-3 py-2 text-sm text-white transition hover:bg-blue-700"
        @click="addSecond"
      >
        Add Product 2
      </button>
    </div>
  </section>

  <section
    class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm shadow-slate-200/60"
  >
    <h2 class="mb-3 text-lg">Cart</h2>
    <div v-html="cartHTML"></div>
    <div class="mt-3 border-t border-slate-200 pt-3 leading-7 text-slate-500">
      {{ summaryText }}
    </div>
  </section>

  <section
    class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm shadow-slate-200/60"
  >
    <h2 class="mb-3 text-lg">Batched Change Log</h2>
    <div
      class="m-0 min-h-30 rounded-xl bg-slate-700 p-3 leading-6 text-green-300"
      v-html="changeLogHTML"
    ></div>
  </section>
</div>
